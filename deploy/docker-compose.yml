# ===================================================================
# MaskWise - docker compose (v2 syntax)
# ===================================================================
# every hardening choice below defends against a specific attack pattern.
# comments name the lesson so future-me / a reviewer can audit the
# security decisions without reading the post-mortem.
#
# START / STOP:
#   cd /opt/maskwise/deploy
#   docker compose up -d                  # start everything
#   docker compose ps                     # check status
#   docker compose logs -f api            # tail api logs
#   docker compose down                   # stop everything
#   docker compose build --no-cache       # rebuild images from scratch
#
# PORT CONVENTION on this box (host-side):
#   8000  travel-api          (existing)
#   8001  nhs-api             (existing, db down)
#   8002  fraud-api           (existing)
#   8005  maskwise api        <- this project
#   8090  pricing             (existing)
#   8501  nhs-dashboard       (existing)
#   8502  portfolio streamlit (existing)
#   8503  maskwise demo       <- Phase 1
#   8520  fraud-dashboard     (existing)
# ===================================================================

services:

  # --- fastapi backend ---
  # the api now also talks to postgres for users + api keys.
  api:
    build:
      context: ../api               # Dockerfile + app/ live in api/
      dockerfile: Dockerfile
    image: maskwise-api:latest
    container_name: maskwise-api
    restart: on-failure:3            # on-failure:3 not unless-stopped - limits malware persistence on crash loops

    # wait for postgres to be healthy before starting - create_all needs the DB up
    depends_on:
      postgres:
        condition: service_healthy

    # never bind containers to 0.0.0.0 - internet scanners would see them.
    # 127.0.0.1 means only nginx (running on the host) can reach it.
    ports:
      - "127.0.0.1:8005:8005"

    # load all MASKWISE_* vars from the .env file at /opt/maskwise/.env.
    # docker-compose resolves paths relative to this compose file's location,
    # so ../ points at /opt/maskwise/ (the repo root)
    env_file:
      - ../.env

    # tmpfs /tmp with noexec,nosuid - blocks any dropped binary from running.
    # this stops the common /tmp-based crypto-miner attack pattern
    tmpfs:
      - /tmp:noexec,nosuid,size=64m

    # hard CPU and memory caps - even if compromised, cannot pin the box.
    # 1 vCPU + 1.5 GB is plenty for Presidio + the spaCy model.
    cpus: "1.0"
    mem_limit: 1.5g

    # health check - docker compose uses this for service_healthy deps.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health').read()"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

    networks:
      - maskwise-internal

    # logging - capped so a runaway log doesn't fill the disk.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  # --- postgres - users + api keys store (Phase 2) ---
  # internal only - no host port, so it is not reachable from the internet.
  # only the api container (same docker network) can connect to it.
  postgres:
    image: postgres:15-alpine
    container_name: maskwise-postgres
    restart: on-failure:3

    # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB come from ../.env
    env_file:
      - ../.env

    # named volume keeps the data when the container is recreated
    volumes:
      - maskwise-pgdata:/var/lib/postgresql/data

    # hard caps - small DB, does not need much
    cpus: "0.5"
    mem_limit: 256m

    # pg_isready returns 0 once postgres can accept connections.
    # double $$ stops compose interpolating - the shell expands it inside the container
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

    networks:
      - maskwise-internal

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  # --- deferred services ---
  # redis: deferred - stateless JWT + postgres keys need no redis yet.
  # frontend: served as a static Next.js export by nginx - no container needed.


# --- networks ---
# docker network isolation - MaskWise containers cannot accidentally
# talk to nhs-db or any other project's containers.
networks:
  maskwise-internal:
    driver: bridge
    name: maskwise-internal


# --- volumes ---
# postgres data lives here - survives `docker compose down` + recreate.
volumes:
  maskwise-pgdata:
    name: maskwise-pgdata
