# ═══════════════════════════════════════════════════════════════════
# MaskWise nginx server block
# ═══════════════════════════════════════════════════════════════════
# DEPLOYMENT (one-time):
#   sudo cat /opt/maskwise/deploy/nginx-maskwise.conf \
#     >> /etc/nginx/sites-enabled/nakularora-tech
#   sudo certbot --expand --nginx -d maskwise.nakularora.tech \
#                                  -d stats.maskwise.nakularora.tech
#   sudo nginx -t      # syntax check
#   sudo nginx -s reload
# ═══════════════════════════════════════════════════════════════════


# ─── HTTP server — redirect to HTTPS ───────────────────────────
# certbot will edit this block to handle ACME challenges. that's OK.
server {
    listen 80;
    listen [::]:80;
    server_name maskwise.nakularora.tech stats.maskwise.nakularora.tech;

    # let certbot handle /.well-known/acme-challenge/ during cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}


# ─── HTTPS — main MaskWise site + API ──────────────────────────
# certbot adds the SSL listener lines automatically when we run
# `certbot --expand --nginx`. block shown here is the post-certbot shape.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name maskwise.nakularora.tech;

    # certbot fills in these cert paths during --expand
    # ssl_certificate /etc/letsencrypt/live/nakularora.tech/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/nakularora.tech/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ─── security headers ──────────────────────────────────────
    # users pasting PII into the site need real trust signals.
    # headers block common XSS / clickjacking / MIME-sniff attacks.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ─── request size cap ──────────────────────────────────────
    # text endpoints handle ~50 KB max. images (Phase 3) up to 10 MB.
    # cap at 11 MB to leave headroom; rejects oversized requests at nginx.
    client_max_body_size 11M;

    # ─── /api/v1/* → FastAPI backend ───────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8005/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # PII responses must not be cached by browsers or CDNs
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ─── /health → FastAPI health endpoint ─────────────────────
    # publicly exposed so Uptime Kuma + external monitors can probe it.
    location = /health {
        proxy_pass http://127.0.0.1:8005/health;
        proxy_set_header Host $host;
        access_log off;        # health checks every 60s — don't fill logs
    }

    # ─── / → frontend (Phase 1 — Next.js static export) ────────
    # for now (Phase 0 stub), redirect root to /health so visitors
    # see SOMETHING when the site is up.
    location / {
        return 302 /health;
    }
}


# ─── HTTPS — public stats dashboard (Phase 2+) ─────────────────
# Grafana lives behind this. Today returns 502 until Grafana is added.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stats.maskwise.nakularora.tech;

    # certbot fills in cert paths during --expand
    # ssl_certificate /etc/letsencrypt/live/nakularora.tech/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/nakularora.tech/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Phase 2 — proxy_pass http://127.0.0.1:3000/ for Grafana
    location / {
        return 503 "Stats dashboard launches in Phase 2.\n";
        add_header Content-Type text/plain;
    }
}
