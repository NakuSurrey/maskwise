# ═══════════════════════════════════════════════════════════════════
# MaskWise — docker compose (v2 syntax)
# ═══════════════════════════════════════════════════════════════════
# every hardening choice below is a defence against a specific attack pattern
# lesson. comments name the lesson so future-me / a reviewer can
# audit the security decisions without reading the post-mortem.
#
# START / STOP:
#   cd /opt/maskwise/deploy
#   docker compose up -d                  # start everything
#   docker compose ps                     # check status
#   docker compose logs -f api            # tail api logs
#   docker compose down                   # stop everything
#   docker compose build --no-cache       # rebuild images from scratch
#
# PORT CONVENTION on this box (host-side):
#   8000  travel-api          (existing)
#   8001  nhs-api             (existing, db down)
#   8002  fraud-api           (existing)
#   8005  maskwise api        ← this project
#   8090  pricing             (existing)
#   8501  nhs-dashboard       (existing)
#   8502  portfolio streamlit (existing)
#   8503  maskwise demo       ← Phase 1
#   8520  fraud-dashboard     (existing)
# ═══════════════════════════════════════════════════════════════════

services:

  # ─── FASTAPI BACKEND ──────────────────────────────────────────
  # the only service running today. Phase 1 will add redis +
  # postgres + frontend. all of those will live in this same file.
  api:
    build:
      context: ../api               # Dockerfile + app/ live in api/
      dockerfile: Dockerfile
    image: maskwise-api:latest
    container_name: maskwise-api
    restart: on-failure:3            # on-failure:3 not unless-stopped — limits malware persistence on crash loops

    # never bind containers to 0.0.0.0 — internet scanners would see them
    # 127.0.0.1 means only nginx (running on the host) can reach it.
    # internet scanners see nothing on this port.
    ports:
      - "127.0.0.1:8005:8005"

    # load all MASKWISE_* vars from the .env file at /opt/maskwise/.env
    # docker-compose resolves paths relative to this compose file's location,
    # so ../ points at /opt/maskwise/ (the repo root)
    env_file:
      - ../.env

    # tmpfs /tmp with noexec,nosuid — blocks any dropped binary from running
    # any binary dropped into /tmp cannot execute (kernel-enforced)
    # this stops the common /tmp-based crypto-miner attack pattern
    tmpfs:
      - /tmp:noexec,nosuid,size=64m

    # hard CPU and memory caps — compromise cannot pin the box or exhaust RAM
    # even if compromised, container cannot pin the box or exhaust RAM.
    # 1 vCPU + 1 GB is plenty for the stub. Phase 2 model-worker will get more.
    cpus: "1.0"
    mem_limit: 1.5g

    # health check — duplicates the in-container check from Dockerfile.
    # docker compose uses this for `condition: service_healthy` deps.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health').read()"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

    networks:
      - maskwise-internal

    # logging — capped so a runaway log doesn't fill the disk.
    # capped — uncapped logs can fill the disk and crash the host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  # ─── Phase 1 placeholders — DO NOT UNCOMMENT YET ─────────────
  # redis:
  #   image: redis:7-alpine
  #   container_name: maskwise-redis
  #   restart: on-failure:3
  #   ports:
  #     - "127.0.0.1:6390:6379"   # random high port; default 6379 reserved
  #   command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
  #   tmpfs:
  #     - /tmp:noexec,nosuid,size=64m
  #   cpus: "0.5"
  #   mem_limit: 512m
  #   networks:
  #     - maskwise-internal


  # ─── Phase 1 placeholders — frontend stub ───────────────────
  # frontend:
  #   build: ../frontend
  #   container_name: maskwise-frontend
  #   restart: on-failure:3
  #   ports:
  #     - "127.0.0.1:8503:80"
  #   networks:
  #     - maskwise-internal


# ─── networks ─────────────────────────────────────────────────
# docker network isolation alone is not a security boundary —
# but it IS a hygiene boundary — MaskWise containers cannot
# accidentally talk to nhs-db or any other project's containers.
networks:
  maskwise-internal:
    driver: bridge
    name: maskwise-internal
