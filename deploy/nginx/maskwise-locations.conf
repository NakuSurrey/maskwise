# MaskWise nginx routes - my reference copy.
# kept so I can rebuild the server if these are ever lost.
# they sit inside the maskwise.nakularora.tech server block.
# the app only listens on 127.0.0.1:8005, so nginx is the only way in.

# POST /mask -> app on 8005. needs the X-API-Key header.
location = /mask {
    proxy_pass http://127.0.0.1:8005/mask;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_no_cache 1;
    proxy_cache_bypass 1;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
}

# docs pages - only live in dev mode.
location ~ ^/(docs|redoc|openapi\.json) {
    proxy_pass http://127.0.0.1:8005;
    proxy_set_header Host $host;
}

# bare root -> send to the health check.
location / {
    return 302 /health;
}
